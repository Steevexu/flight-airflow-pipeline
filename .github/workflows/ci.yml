name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-dbt:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: warehouse
        options: >-
          --health-cmd="pg_isready -U airflow -d warehouse"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      PYTHONPATH: ${{ github.workspace }}
      PG_HOST: localhost
      PG_PORT: "5432"
      PG_DB: warehouse
      PG_USER: airflow
      PG_PASSWORD: airflow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install Python deps (ETL + CI + dbt)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pandas psycopg2-binary dbt-postgres==1.8.2

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d "$PG_DB" && exit 0
            sleep 2
          done
          echo "Postgres did not become ready in time" && exit 1

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: Init DB schema
        run: |
          python - << 'PY'
          import os, psycopg2, pathlib
          sql = pathlib.Path("sql/01_init.sql").read_text(encoding="utf-8")
          conn = psycopg2.connect(
              host=os.environ["PG_HOST"],
              port=int(os.environ["PG_PORT"]),
              dbname=os.environ["PG_DB"],
              user=os.environ["PG_USER"],
              password=os.environ["PG_PASSWORD"],
          )
          conn.autocommit = True
          with conn.cursor() as cur:
              cur.execute(sql)
          conn.close()
          print("DB init OK")
          PY

      - name: Run unit tests
        run: |
          pytest -q

      - name: dbt debug
        run: |
          dbt debug --project-dir dbt/flight_dbt --profiles-dir dbt/profiles

      - name: dbt run
        run: |
          dbt run --project-dir dbt/flight_dbt --profiles-dir dbt/profiles

      - name: dbt test
        run: |
          dbt test --project-dir dbt/flight_dbt --profiles-dir dbt/profiles